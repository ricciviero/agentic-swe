version: 1

agents:
  - codex
  - claude-code

project_skills_dir: .agents/skills
selected_skills:
  - name: agents-setup
    trigger: Bootstrap or migrate agent instructions and project skills.
  - name: iterations-planner
    trigger: Plan non-trivial workflow, feature, refactor, migration, or fix work.
  - name: skill-creator
    trigger: Create or materially revise a Codex-compatible skill.

workflow:
  planning_gate: non-trivial
  iteration_directory: iterazioni
  fix_directory: fix
  local_workspaces_gitignored: true
